<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semicon Sector Monitor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;
  --bg-card:#ffffff;
  --bg-card2:#f8f9fb;
  --border:#dde2ea;
  --border2:#c8d0dc;
  --text:#1a2332;
  --muted:#6b7a90;
  --dim:#e2e6ed;
  --green:#16a34a;
  --green2:#15803d;
  --green-bg:#f0fdf4;
  --red:#dc2626;
  --red2:#b91c1c;
  --red-bg:#fef2f2;
  --blue:#2563eb;
  --blue-bg:#eff6ff;
  --amber:#d97706;
  --amber-bg:#fffbeb;
  --obs-text:#a0aec0;
  --obs-bg:#f7f8fa;
}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5;min-height:100vh}

.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 22px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex-shrink:0}
.dot.live{background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.btn{background:#fff;border:1px solid var(--border2);color:var(--muted);padding:7px 14px;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.02em;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.btn:disabled{opacity:.35;cursor:default}
.btn-copy{background:var(--text);border:1px solid var(--text);color:#fff;padding:7px 14px;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.02em;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-copy:hover{background:#2a3a50;border-color:#2a3a50}
.btn-copy.copied{background:var(--green);border-color:var(--green)}

.summary{display:flex;border-bottom:1px solid var(--border);background:#fff;overflow-x:auto}
.sum-item{padding:10px 20px;border-right:1px solid var(--border);flex-shrink:0}
.sum-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;font-weight:600}
.sum-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}

.toolbar{display:flex;align-items:center;gap:6px;padding:10px 22px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg-card2)}
.tb-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-right:2px;white-space:nowrap}
.tb-sep{width:1px;height:22px;background:var(--border);margin:0 8px;flex-shrink:0}
.fbtn{background:#fff;border:1px solid var(--border);color:var(--muted);padding:5px 12px;font-family:inherit;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.trade-btn{background:#fff;border:1px solid var(--border);color:var(--muted);padding:5px 12px;font-family:inherit;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.trade-btn:hover{border-color:var(--border2);color:var(--text)}
.trade-btn.on{border-color:var(--amber);color:var(--amber);background:var(--amber-bg)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;padding:16px 22px 32px}

.card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;transition:box-shadow .2s,border-color .2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);border-color:var(--border2)}
.card.hidden{display:none}
.card-bar{height:3px;border-radius:10px 10px 0 0;position:absolute;top:0;left:0;right:0}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin:4px 0 10px}
.sec-name{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.sec-avg{font-size:22px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.spark-wrap{height:32px;margin-bottom:10px}
canvas.spark{width:100%;height:32px;display:block}
.bar-track{height:3px;background:var(--dim);border-radius:2px;margin-bottom:10px}
.bar-fill{height:3px;border-radius:2px;transition:width .6s ease}
.counts{display:flex;gap:12px;margin-bottom:8px}
.cpill{font-size:12px;color:var(--muted);font-weight:500}
.cup{color:var(--green);font-weight:700}
.cdn{color:var(--red);font-weight:700}
.divider{height:1px;background:var(--border);margin-bottom:10px}
.ticker-list{display:flex;flex-direction:column;gap:5px}
.t-row{display:flex;align-items:center;gap:6px;padding:2px 0}
.t-sym{font-size:13px;color:var(--muted);font-weight:600;min-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-row.obs .t-sym{color:var(--obs-text)}
.t-row.obs .t-pct{opacity:.5}
.t-bar{flex:1;height:2px;background:var(--dim);border-radius:1px;position:relative;overflow:hidden}
.t-bar-fill{height:2px;border-radius:1px;position:absolute;top:0}
.t-pct{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;min-width:58px;text-align:right}
.vol-tag{font-size:9px;padding:2px 5px;border-radius:3px;background:var(--blue-bg);color:var(--blue);font-weight:700;letter-spacing:.04em;flex-shrink:0}
.obs-badge{font-size:9px;padding:2px 5px;border-radius:3px;background:var(--obs-bg);color:var(--obs-text);font-weight:600;flex-shrink:0}

.loading-ov{position:absolute;inset:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);border-radius:10px;gap:8px;z-index:5;font-weight:500}
.spinner{width:14px;height:14px;border:2px solid var(--dim);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-tag{font-size:11px;color:var(--red);margin-top:6px;font-weight:500}

.progress-bar{height:2px;background:var(--blue-bg);position:fixed;top:0;left:0;z-index:50;transition:width .3s ease;border-radius:0 2px 2px 0}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}

.footer{padding:10px 22px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);background:#fff}

@media(max-width:640px){
  .grid{grid-template-columns:1fr;padding:10px 12px 24px}
  .hdr,.toolbar,.summary,.footer{padding-left:12px;padding-right:12px}
  .hdr{flex-wrap:wrap;gap:8px}
}
</style>
</head>
<body>

<div class="progress-bar" id="prog" style="width:0%"></div>

<div class="hdr">
  <div>
    <div class="hdr-title">Semicon Sector Monitor</div>
    <div class="hdr-sub" id="last-update">—</div>
  </div>
  <div class="hdr-right">
    <span class="dot" id="dot"></span>
    <span style="font-size:12px;color:var(--muted);font-weight:500" id="status-txt">idle</span>
    <button class="btn" id="ref-btn" onclick="fetchAll()">↻ Refresh</button>
    <button class="btn-copy" id="copy-btn" onclick="copyForClaude()">Copy for Claude</button>
  </div>
</div>

<div class="summary">
  <div class="sum-item"><div class="sum-label">Sectors</div><div class="sum-val" id="s-sec">—</div></div>
  <div class="sum-item"><div class="sum-label">Tickers</div><div class="sum-val" id="s-tick">—</div></div>
  <div class="sum-item"><div class="sum-label">Advancing</div><div class="sum-val" style="color:var(--green)" id="s-up">—</div></div>
  <div class="sum-item"><div class="sum-label">Declining</div><div class="sum-val" style="color:var(--red)" id="s-dn">—</div></div>
  <div class="sum-item"><div class="sum-label">Best sector</div><div class="sum-val" style="color:var(--green)" id="s-best">—</div></div>
  <div class="sum-item"><div class="sum-label">Worst sector</div><div class="sum-val" style="color:var(--red)" id="s-worst">—</div></div>
</div>

<div class="toolbar">
  <span class="tb-label">Region</span>
  <button class="fbtn active" onclick="setRegion('ALL',this)">All</button>
  <button class="fbtn" onclick="setRegion('US',this)">🇺🇸 US</button>
  <button class="fbtn" onclick="setRegion('TW',this)">🇹🇼 Taiwan</button>
  <button class="fbtn" onclick="setRegion('HK',this)">🇭🇰 HK</button>
  <button class="fbtn" onclick="setRegion('EU',this)">🇪🇺 Europe</button>
  <button class="fbtn" onclick="setRegion('JP',this)">🇯🇵 Japan</button>
  <button class="fbtn" onclick="setRegion('KR',this)">🇰🇷 Korea</button>
  <button class="fbtn" onclick="setRegion('CN',this)">🇨🇳 China</button>
  <div class="tb-sep"></div>
  <button class="trade-btn" id="trade-btn" onclick="toggleTrade()">👁 Tradeable only</button>
</div>

<div class="grid" id="grid"></div>
<div class="footer">Data via Twelve Data · prices delayed ~15 min · VOL↑ = today's volume &gt;1.5× avg · greyed tickers = observe only (CN / KR)</div>
<div class="toast" id="toast"></div>

<script>
const TD_KEY = '735a1271f96946299260949a1daf9147';
const NON_TRADE = new Set(['CN','KR']);
const FLAGS = {US:'🇺🇸',TW:'🇹🇼',HK:'🇭🇰',EU:'🇪🇺',JP:'🇯🇵',KR:'🇰🇷',CN:'🇨🇳'};

// Twelve Data uses exchange suffix format: symbol:EXCHANGE
// For non-US we specify exchange explicitly
const SECTORS = [
  { name:'Fabless', color:'#2563eb', tickers:[
    {sym:'NVDA',region:'US',td:'NVDA'},
    {sym:'AVGO',region:'US',td:'AVGO'},
    {sym:'GOOG',region:'US',td:'GOOG'},
    {sym:'MRVL',region:'US',td:'MRVL'},
  ]},
  { name:'FAB / Advanced Packaging', color:'#0891b2', tickers:[
    {sym:'TSM', region:'US',td:'TSM'},
    {sym:'INTC',region:'US',td:'INTC'},
    {sym:'AMKR',region:'US',td:'AMKR'},
    {sym:'ASX', region:'US',td:'ASX'},
    {sym:'6239.TW',region:'TW',label:'Powertech',td:'6239:TWSE'},
  ]},
  { name:'CPU', color:'#7c3aed', tickers:[
    {sym:'ARM',region:'US',td:'ARM'},
    {sym:'AMD',region:'US',td:'AMD'},
  ]},
  { name:'Metrology', color:'#d97706', tickers:[
    {sym:'CAMT',region:'US',td:'CAMT'},
    {sym:'ONTO',region:'US',td:'ONTO'},
    {sym:'KLAC',region:'US',td:'KLAC'},
    {sym:'NVMI',region:'US',td:'NVMI'},
    {sym:'FORM',region:'US',td:'FORM'},
  ]},
  { name:'Deposition', color:'#db2777', tickers:[
    {sym:'LRCX',region:'US',td:'LRCX'},
    {sym:'AMAT',region:'US',td:'AMAT'},
    {sym:'AEIS',region:'US',td:'AEIS'},
  ]},
  { name:'Packaging Equipment', color:'#ea580c', tickers:[
    {sym:'522.HK', region:'HK',label:'ASMPT',td:'522:HKEX'},
    {sym:'KLIC',   region:'US',td:'KLIC'},
  ]},
  { name:'Photonics', color:'#16a34a', tickers:[
    {sym:'LITE',region:'US',td:'LITE'},
    {sym:'COHR',region:'US',td:'COHR'},
    {sym:'CIEN',region:'US',td:'CIEN'},
    {sym:'AAOI',region:'US',td:'AAOI'},
    {sym:'FN',  region:'US',td:'FN'},
    {sym:'NOK', region:'US',td:'NOK'},
    {sym:'AXTI',region:'US',td:'AXTI'},
    {sym:'GLW', region:'US',td:'GLW'},
    {sym:'MTSI',region:'US',td:'MTSI'},
    {sym:'SMTC',region:'US',td:'SMTC'},
    {sym:'TSEM',region:'US',td:'TSEM'},
    {sym:'GFS', region:'US',td:'GFS'},
    {sym:'6451.TWO', region:'TW',label:'Shunsin',   td:'6451:TPEX'},
    {sym:'5801.T',   region:'JP',label:'Furukawa',  td:'5801:TSE'},
    {sym:'300308.SZ',region:'CN',label:'Innolight', td:'300308:SZSE'},
    {sym:'300502.SZ',region:'CN',label:'Eoptolink', td:'300502:SZSE'},
    {sym:'300394.SZ',region:'CN',label:'Suzhou TFC',td:'300394:SZSE'},
    {sym:'002281.SZ',region:'CN',label:'Accelink',  td:'002281:SZSE'},
    {sym:'300570.SZ',region:'CN',label:'T&S Comm',  td:'300570:SZSE'},
  ]},
  { name:'Photonics Testing', color:'#0d9488', tickers:[
    {sym:'VIAV',region:'US',td:'VIAV'},
    {sym:'KEYS',region:'US',td:'KEYS'},
    {sym:'TER', region:'US',td:'TER'},
    {sym:'2360.TW',  region:'TW',label:'Chroma ATE',  td:'2360:TWSE'},
    {sym:'300757.SZ',region:'CN',label:'Robotechnik', td:'300757:SZSE'},
  ]},
  { name:'Memory', color:'#9333ea', tickers:[
    {sym:'SNDK',region:'US',td:'SNDK'},
    {sym:'MU',  region:'US',td:'MU'},
    {sym:'STX', region:'US',td:'STX'},
    {sym:'WDC', region:'US',td:'WDC'},
    {sym:'005930.KS',region:'KR',label:'Samsung', td:'005930:KRX'},
    {sym:'000660.KS',region:'KR',label:'SK Hynix',td:'000660:KRX'},
  ]},
  { name:'Memory Testing', color:'#475569', tickers:[
    {sym:'6857.T',region:'JP',label:'Advantest',td:'6857:TSE'},
  ]},
  { name:'Cooling', color:'#0284c7', tickers:[
    {sym:'VRT',region:'US',td:'VRT'},
    {sym:'NVT',region:'US',td:'NVT'},
    {sym:'ETN',region:'US',td:'ETN'},
    {sym:'3324.TWO', region:'TW',label:'Auras',    td:'3324:TPEX'},
    {sym:'2308.TW',  region:'TW',label:'Delta',    td:'2308:TWSE'},
    {sym:'002837.SZ',region:'CN',label:'Envicool', td:'002837:SZSE'},
  ]},
  { name:'BTM Energy', color:'#b45309', tickers:[
    {sym:'BE',  region:'US',td:'BE'},
    {sym:'GEV', region:'US',td:'GEV'},
    {sym:'FTAI',region:'US',td:'FTAI'},
    {sym:'SEI', region:'US',td:'SEI'},
    {sym:'CAT', region:'US',td:'CAT'},
    {sym:'CMI', region:'US',td:'CMI'},
    {sym:'HWM', region:'US',td:'HWM'},
    {sym:'BW',  region:'US',td:'BW'},
  ]},
];

// Flatten all tickers for batch fetching
const ALL_TICKERS = [];
SECTORS.forEach(sec => sec.tickers.forEach(t => {
  if(!ALL_TICKERS.find(x=>x.sym===t.sym)) ALL_TICKERS.push(t);
}));

const priceData = {};   // sym -> {pct, volume, avgVolume}
const histData  = {};   // sectorName -> [pct array]
const state     = {};   // sectorName -> {loading, error}
let regionFilter = 'ALL', tradeOnly = false;
let fetchedCount = 0, totalToFetch = 0;

function isObs(r){ return NON_TRADE.has(r); }
function visTickers(sec){
  return sec.tickers.filter(t=>{
    if(tradeOnly && isObs(t.region)) return false;
    if(regionFilter!=='ALL' && t.region!==regionFilter) return false;
    return true;
  });
}

function pctColor(v, obs){
  if(v===null||v===undefined) return 'var(--muted)';
  if(obs) return v>0?'#4ade80':v<0?'#f87171':'var(--obs-text)';
  const a=Math.abs(v);
  if(v>0){ return a>=5?'#15803d':a>=3?'#16a34a':a>=1?'#22c55e':'#4ade80'; }
  if(v<0){ return a>=5?'#b91c1c':a>=3?'#dc2626':a>=1?'#ef4444':'#f87171'; }
  return 'var(--muted)';
}
function fmt(v){ if(v===null||v===undefined) return '—'; return (v>=0?'+':'')+v.toFixed(2)+'%'; }
function barW(v,max){ if(!v) return '0%'; return Math.min(Math.abs(v)/max*100,100).toFixed(1)+'%'; }
function secAvg(sec){
  const vis=visTickers(sec);
  const vals=vis.map(t=>priceData[t.sym]?.pct).filter(v=>v!==null&&v!==undefined);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}

function setProgress(pct){
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('prog').style.background = pct>=100?'var(--green)':'var(--blue)';
}

function showToast(msg,duration=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}

function renderSummary(){
  const visSecs=SECTORS.filter(s=>visTickers(s).length>0);
  document.getElementById('s-sec').textContent=visSecs.length;
  let total=0,up=0,dn=0;
  visSecs.forEach(sec=>{
    visTickers(sec).forEach(t=>{
      const v=priceData[t.sym]?.pct;
      if(v===null||v===undefined) return;
      total++; if(v>0)up++; else if(v<0)dn++;
    });
  });
  document.getElementById('s-tick').textContent=total||'—';
  document.getElementById('s-up').textContent=up||'—';
  document.getElementById('s-dn').textContent=dn||'—';
  const avgs=SECTORS.map(s=>({name:s.name,avg:secAvg(s)})).filter(s=>s.avg!==null);
  if(avgs.length){
    avgs.sort((a,b)=>b.avg-a.avg);
    document.getElementById('s-best').textContent=avgs[0].name+' '+fmt(avgs[0].avg);
    document.getElementById('s-worst').textContent=avgs[avgs.length-1].name+' '+fmt(avgs[avgs.length-1].avg);
  } else {
    document.getElementById('s-best').textContent='—';
    document.getElementById('s-worst').textContent='—';
  }
}

function drawSpark(canvas, hist){
  if(!hist||hist.length<2) return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||260, H=32;
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const min=Math.min(...hist),max=Math.max(...hist),range=max-min||1;
  const pts=hist.map((v,i)=>({x:(i/(hist.length-1))*(W-4)+2,y:H-((v-min)/range)*(H-6)-3}));
  const up=hist[hist.length-1]>=hist[0];
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=up?'#16a34a':'#dc2626'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pts[0].x,H);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H); ctx.closePath();
  ctx.fillStyle=up?'rgba(22,163,74,.1)':'rgba(220,38,38,.1)'; ctx.fill();
}

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  SECTORS.forEach(sec=>{
    const vis=visTickers(sec);
    const s=state[sec.name]||{};
    const card=document.createElement('div');
    card.className='card'+(vis.length===0?' hidden':'');
    if(vis.length===0){ grid.appendChild(card); return; }

    const vals=vis.map(t=>priceData[t.sym]?.pct).filter(v=>v!==null&&v!==undefined);
    const avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    const upC=vals.filter(v=>v>0).length, dnC=vals.filter(v=>v<0).length;
    const acCol=avg===null?'var(--border)':avg>0?'#16a34a':'#dc2626';
    const spId='sp_'+sec.name.replace(/\W/g,'_');

    const rows=vis.map(t=>{
      const d=priceData[t.sym];
      const v=d?.pct, obs=isObs(t.region);
      const col=pctColor(v,obs);
      const fw=barW(v,10), fs=(v||0)>=0?'left:0':'right:0';
      const fc=v===null||v===undefined?'var(--dim)':v>0?'#16a34a':'#dc2626';
      const label=t.label||t.sym;
      const volSpike=d?.volume&&d?.avgVolume&&d.volume>d.avgVolume*1.5;
      return `<div class="t-row${obs?' obs':''}">
        <span class="t-sym" title="${t.sym}">${FLAGS[t.region]||''} ${label}</span>
        <div class="t-bar"><div class="t-bar-fill" style="width:${fw};background:${fc};${fs}"></div></div>
        <span class="t-pct" style="color:${col}">${fmt(v)}</span>
        ${volSpike?'<span class="vol-tag">VOL↑</span>':''}
        ${obs?'<span class="obs-badge">observe</span>':''}
      </div>`;
    }).join('');

    card.innerHTML=`
      <div class="card-bar" style="background:${acCol}"></div>
      <div class="card-head">
        <div class="sec-name">${sec.name}</div>
        <div class="sec-avg" style="color:${pctColor(avg,false)}">${fmt(avg)}</div>
      </div>
      <div class="spark-wrap"><canvas class="spark" id="${spId}"></canvas></div>
      <div class="bar-track"><div class="bar-fill" style="width:${barW(avg,5)};background:${acCol}"></div></div>
      <div class="counts"><span class="cpill"><span class="cup">${upC}</span> up</span><span class="cpill"><span class="cdn">${dnC}</span> down</span></div>
      <div class="divider"></div>
      <div class="ticker-list">${rows}</div>
      ${s.error?'<div class="err-tag">⚠ Some tickers failed to load</div>':''}
      ${s.loading?'<div class="loading-ov"><div class="spinner"></div>Fetching…</div>':''}
    `;
    grid.appendChild(card);
    const hist=histData[sec.name];
    if(hist){ requestAnimationFrame(()=>{ const c=document.getElementById(spId); if(c) drawSpark(c,hist); }); }
  });
  renderSummary();
}

// Twelve Data: batch quote up to 120 symbols per call
async function fetchBatchQuotes(tickers){
  // Build comma-separated symbol list with exchange suffix
  const symbols = tickers.map(t=>t.td).join(',');
  const url = `https://api.twelvedata.com/quote?symbol=${encodeURIComponent(symbols)}&apikey=${TD_KEY}`;
  const res = await fetch(url, {signal:AbortSignal.timeout(15000)});
  if(!res.ok) throw new Error('http '+res.status);
  const json = await res.json();
  // If single ticker returned, wrap in object
  const data = tickers.length===1 ? {[tickers[0].td]: json} : json;
  tickers.forEach(t=>{
    const q = data[t.td];
    if(!q || q.status==='error' || !q.percent_change){
      priceData[t.sym] = {pct:null, volume:null, avgVolume:null};
      return;
    }
    priceData[t.sym] = {
      pct: parseFloat(q.percent_change),
      volume: parseFloat(q.volume)||null,
      avgVolume: parseFloat(q.average_volume)||null,
    };
  });
}

// Twelve Data: time series for sparkline (last 6 days)
async function fetchSparklines(){
  // Fetch sparklines sector by sector to keep calls manageable
  for(const sec of SECTORS){
    // Use first 3 US tickers per sector for sparkline average (saves calls)
    const sample = sec.tickers.filter(t=>t.region==='US' || t.region==='TW').slice(0,3);
    if(!sample.length) continue;
    const symbols = sample.map(t=>t.td).join(',');
    try{
      const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbols)}&interval=1day&outputsize=6&apikey=${TD_KEY}`;
      const res = await fetch(url, {signal:AbortSignal.timeout(12000)});
      if(!res.ok) continue;
      const json = await res.json();
      const allHist = [];
      sample.forEach(t=>{
        const d = sample.length===1 ? json : json[t.td];
        if(!d||d.status==='error'||!d.values) return;
        const closes = d.values.slice().reverse().map(v=>parseFloat(v.close));
        if(closes.length>=2) allHist.push(closes);
      });
      if(allHist.length){
        const len=Math.min(...allHist.map(h=>h.length));
        const avg=Array.from({length:len},(_,i)=>{
          const vs=allHist.map(h=>h[i]).filter(v=>!isNaN(v));
          return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:null;
        }).filter(v=>v!==null);
        if(avg.length>=2){ const base=avg[0]; histData[sec.name]=avg.map(v=>((v-base)/base)*100); }
      }
    } catch(e){ /* skip sparkline on error */ }
  }
}

async function fetchAll(){
  const btn=document.getElementById('ref-btn'),dot=document.getElementById('dot'),txt=document.getElementById('status-txt');
  btn.disabled=true; dot.className='dot live'; txt.textContent='fetching…';
  setProgress(5);

  // Mark all sectors loading
  SECTORS.forEach(sec=>{ state[sec.name]={loading:true,error:false}; });
  renderGrid();

  // Batch fetch quotes — Twelve Data allows up to 120 symbols per call
  const BATCH = 100;
  const batches = [];
  for(let i=0;i<ALL_TICKERS.length;i+=BATCH) batches.push(ALL_TICKERS.slice(i,i+BATCH));

  let done=0;
  for(const batch of batches){
    try{ await fetchBatchQuotes(batch); }
    catch(e){ batch.forEach(t=>{ priceData[t.sym]={pct:null,volume:null,avgVolume:null}; }); }
    done+=batch.length;
    setProgress(10 + (done/ALL_TICKERS.length)*60);
  }

  // Mark sectors done
  SECTORS.forEach(sec=>{ state[sec.name]={loading:false,error:false}; });
  renderGrid();
  setProgress(75);

  // Fetch sparklines in background
  await fetchSparklines();
  setProgress(100);
  renderGrid();

  btn.disabled=false; dot.className='dot'; txt.textContent='idle';
  const now=new Date();
  document.getElementById('last-update').textContent=
    'Last refresh: '+now.toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'})+
    ' · '+now.toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});

  setTimeout(()=>setProgress(0), 800);
}

function setRegion(r,el){
  regionFilter=r;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function toggleTrade(){
  tradeOnly=!tradeOnly;
  const btn=document.getElementById('trade-btn');
  btn.className='trade-btn'+(tradeOnly?' on':'');
  btn.textContent=tradeOnly?'👁 All tickers':'👁 Tradeable only';
  renderGrid();
}

function copyForClaude(){
  const now=new Date();
  const timeStr=now.toLocaleString('en-MY',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const lines=[];
  lines.push('=== SEMICON SECTOR MONITOR — EOD SNAPSHOT ===');
  lines.push('Generated: '+timeStr+' MYT');
  lines.push('');

  const visSecs=SECTORS.filter(s=>visTickers(s).length>0);
  let total=0,up=0,dn=0;
  visSecs.forEach(sec=>{
    visTickers(sec).forEach(t=>{
      const v=priceData[t.sym]?.pct;
      if(v===null||v===undefined) return;
      total++; if(v>0)up++; else if(v<0)dn++;
    });
  });
  lines.push(`SUMMARY: ${SECTORS.length} sectors | ${total} tickers with data | ${up} advancing | ${dn} declining`);
  lines.push('');

  const avgs=SECTORS.map(s=>({name:s.name,avg:secAvg(s)})).filter(s=>s.avg!==null);
  avgs.sort((a,b)=>b.avg-a.avg);
  lines.push('SECTOR RANKING (best → worst):');
  avgs.forEach((s,i)=>lines.push(`  ${i+1}. ${s.name}: ${fmt(s.avg)}`));
  lines.push('');

  const spikes=[];
  SECTORS.forEach(sec=>{
    sec.tickers.forEach(t=>{
      const d=priceData[t.sym];
      if(d?.volume&&d?.avgVolume&&d.volume>d.avgVolume*1.5) spikes.push((t.label||t.sym)+' ['+sec.name+']');
    });
  });
  if(spikes.length){ lines.push('VOLUME SPIKES: '+spikes.join(', ')); lines.push(''); }

  lines.push('--- SECTOR DETAIL ---');
  SECTORS.forEach(sec=>{
    const vis=sec.tickers; // always include all for report
    const avg=secAvg(sec);
    lines.push('');
    lines.push('['+sec.name+'] sector avg: '+fmt(avg));
    vis.forEach(t=>{
      const d=priceData[t.sym];
      const v=d?.pct;
      const label=(t.label||t.sym).padEnd(16);
      const obs=isObs(t.region)?'[observe]':'';
      const vol=d?.volume&&d?.avgVolume&&d.volume>d.avgVolume*1.5?'[VOL↑]':'';
      lines.push(`  ${FLAGS[t.region]||''} ${label} ${fmt(v).padStart(8)}  ${vol}${obs}`);
    });
  });

  lines.push('');
  lines.push('=== END SNAPSHOT ===');
  lines.push('');
  lines.push('Please provide an EOD analysis covering:');
  lines.push('1. Sector rotation — which sectors led and lagged, any divergence');
  lines.push('2. Standout movers — biggest individual % moves, especially with VOL↑ confirmation');
  lines.push('3. Regional divergence — US vs Taiwan/HK/Japan/Korea splits');
  lines.push('4. BTM Energy vs Semicon — any macro signal in their relative performance');
  lines.push('5. Flags for the next session — anything worth watching or acting on');

  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✓ Copied!'; btn.classList.add('copied');
    showToast('Snapshot copied — paste into Claude for EOD report');
    setTimeout(()=>{ btn.textContent='Copy for Claude'; btn.classList.remove('copied'); },2500);
  }).catch(()=>showToast('Copy failed — try again'));
}

renderGrid();
fetchAll();
